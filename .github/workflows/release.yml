name: Release

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      release_sha: ${{ steps.version.outputs.release_sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Read package version
        id: version
        run: |
          RELEASE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          RELEASE_SHA=$(git rev-parse HEAD)
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Preparing release $RELEASE_VERSION from $RELEASE_SHA"

      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.release_version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            exit 1
          fi
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "GitHub Release v$VERSION already exists"
            exit 1
          fi

      - name: Check package version does not already exist
        run: |
          VERSION="${{ steps.version.outputs.release_version }}"
          python - "$VERSION" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          project = "svpbuild"
          version = sys.argv[1]
          indexes = {
              "PyPI": f"https://pypi.org/pypi/{project}/{version}/json",
              "TestPyPI": f"https://test.pypi.org/pypi/{project}/{version}/json",
          }

          for name, url in indexes.items():
              try:
                  with urllib.request.urlopen(url, timeout=15):
                      print(f"{name} already has {project} {version}")
                      raise SystemExit(1)
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      print(f"{name} does not have {project} {version}")
                      continue
                  raise
          PY

      - name: Check lockfile
        run: uv lock --check

      - name: Run checks
        run: |
          uv run --locked --group dev ruff check .
          uv run --locked --group dev ruff format --check .
          uv run --locked --group dev pytest

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: prepare
    environment: testpypi

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

      - name: Smoke test TestPyPI install
        run: |
          for attempt in 1 2 3 4 5; do
            if uvx \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              --from svpbuild==${{ needs.prepare.outputs.release_version }} \
              svpbuild --help; then
              exit 0
            fi
            echo "TestPyPI install failed on attempt $attempt; retrying..."
            sleep 20
          done
          exit 1

  publish-pypi:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-testpypi
    environment: pypi

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Publish to PyPI
        run: uv publish dist/*

  github-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-pypi

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git tag "v${{ needs.prepare.outputs.release_version }}" "${{ needs.prepare.outputs.release_sha }}"
          git push origin "v${{ needs.prepare.outputs.release_version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.prepare.outputs.release_version }}" \
            --title "v${{ needs.prepare.outputs.release_version }}" \
            --generate-notes
